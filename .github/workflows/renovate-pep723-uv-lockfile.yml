name: Update PEP 723 Script Lockfiles (Renovate)

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.py'

permissions:
  contents: write

jobs:
  update-lockfiles:
    runs-on: ubuntu-latest
    if: github.actor == 'renovate[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Update PEP 723 lockfiles
        run: |
          for f in $(find . -name "*.py" -not -path "*/.*" -not -path "./.venv/*"); do
            if [ -f "$f.lock" ]; then
              echo "Updating lockfile for $f..."
              uv lock --script "$f"
            fi
          done

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "chore(deps): update PEP 723 script lockfile(s)"
