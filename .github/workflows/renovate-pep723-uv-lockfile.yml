name: Update PEP 723 Script Lockfiles (Renovate)

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.py'

permissions:
  contents: write

jobs:
  update-lockfiles:
    runs-on: ubuntu-latest
    if: github.actor == 'renovate[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Update PEP 723 lockfiles
        run: |
          for f in $(find . -name "*.py" -not -path "*/.*" -not -path "./.venv/*"); do
            if [ -f "$f.lock" ]; then
              echo "Updating lockfile for $f..."
              uv lock --script "$f"
            fi
          done

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore(deps): update PEP 723 script lockfile(s)"
